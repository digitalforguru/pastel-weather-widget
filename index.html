<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DigitalGuru's Weather Widget</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <body>

  <!-- 🌸 BUILDER MODE ONLY -->
  <div class="builder-ui">

    <!-- Top Controls -->
    <div class="top-left-controls">
      <div id="locationBtn" class="btn location-btn"></div>
      <div id="themeToggle" class="btn theme-toggle-btn"></div>
    </div>

    <!-- Theme Options -->
    <div id="themeOptions" class="theme-options hidden">
      <div class="theme-circle" data-theme="pink"></div>
      <div class="theme-circle" data-theme="beige"></div>
      <div class="theme-circle" data-theme="blue"></div>
      <div class="theme-circle" data-theme="green"></div>
    </div>

    <!-- City Input -->
    <input id="cityInput" class="city-input hidden" />

    <!-- Setup Text -->
    <div id="usageTip" class="usage-tip">
      welcome to your Notion widget by digitalguru!
      this widget will only work when you set up your location + theme on this page. click to customize, then copy your embed link, paste, and enjoy your weather widget! ────୨ৎ──── 
    </div>

    <!-- Copy Button -->
    <div class="setup-area">
      <button id="copyLinkBtn" class="copy-btn">
        copy my embed Notion link .ᐟ.ᐟ
      </button>

      <p id="copyMessage" class="copy-message hidden">
        copied! paste into notion .ᐟ.ᐟ
      </p>
    </div>

  </div>

  <div id="weatherWidget" class="widget pink small-square">

    <div class="weather-content">
      <img id="weatherIcon" />
      <p id="locationName"></p>
      <p id="temperature"></p>
      <p id="description"></p>
    </div>

  </div>

  <script src="weather.js"></script>
</body>
</html>
